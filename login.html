<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0A84FF" />
    <link rel="manifest" href="manifest.json" />
    <title>JSL FastLine | Sign In</title>
    <link rel="shortcut icon" href="RoundFavicon.png" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #1e1d50, #3d6e8f);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow-x: hidden;
      }

      body.dark {
        background: linear-gradient(135deg, #0f172a, #1a1f3a);
      }

      .cyber-grid {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(10, 132, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(10, 132, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
        animation: gridPulse 8s infinite alternate;
      }
      @keyframes gridPulse {
        0% {
          opacity: 0.3;
        }
        100% {
          opacity: 0.7;
        }
      }

      .particle {
        position: fixed;
        background: radial-gradient(
          circle,
          rgba(10, 132, 255, 0.6),
          rgba(0, 229, 204, 0)
        );
        width: 3px;
        height: 3px;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(1px);
        animation: floatParticle 15s infinite linear;
        z-index: 0;
      }
      @keyframes floatParticle {
        0% {
          transform: translateY(100vh) translateX(0px);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        90% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(-10vh) translateX(30px);
          opacity: 0;
        }
      }

      .login-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 480px;
        margin: 1.5rem;
        backdrop-filter: blur(12px);
        background: rgba(245, 244, 240, 0.95);
        border-radius: 2rem;
        border: 1px solid rgba(10, 132, 255, 0.2);
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.08),
          0 0 20px rgba(10, 132, 255, 0.1);
        transition: all 0.3s ease;
        animation: fadeSlideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }

      body.dark .login-container {
        background: rgba(15, 23, 42, 0.85);
        border-color: rgba(10, 132, 255, 0.3);
      }

      @keyframes fadeSlideUp {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.97);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .vertex-card {
        padding: 2.2rem 2rem 2rem 2rem;
      }

      .logo-area {
        text-align: center;
        margin-bottom: 2rem;
      }
      .logo-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 0.8rem;
      }
      .vertex-logo {
        max-width: 110px;
        max-height: 110px;
        width: auto;
        height: auto;
        display: inline-block;
        filter: drop-shadow(0 0 12px rgba(10, 132, 255, 0.5));
        transition: all 0.3s ease;
        animation: logoGlowPulse 3s infinite alternate;
        border-radius: 24px;
        cursor: pointer;
      }
      .vertex-logo:hover {
        filter: drop-shadow(0 0 25px rgba(10, 132, 255, 0.8));
        transform: scale(1.02);
      }
      @keyframes logoGlowPulse {
        0% {
          filter: drop-shadow(0 0 5px rgba(10, 132, 255, 0.4));
          transform: scale(1);
        }
        100% {
          filter: drop-shadow(0 0 20px rgba(10, 132, 255, 0.8));
          transform: scale(1.02);
        }
      }

      .brand-name {
        font-size: 1.6rem;
        font-weight: 700;
        background: linear-gradient(120deg, #0a84ff, #00e5cc, #0a84ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: 2px;
        margin-top: 8px;
      }
      .tagline {
        font-size: 0.7rem;
        letter-spacing: 2px;
        color: #0a84ff;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .session-banner {
        background: rgba(0, 229, 204, 0.08);
        border: 1px solid rgba(0, 229, 204, 0.3);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.82rem;
        color: #00e5cc;
      }
      .session-banner i {
        font-size: 1rem;
        flex-shrink: 0;
      }
      .session-banner strong {
        color: #0a84ff;
      }

      .switch-account-pill {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        width: 100%;
        background: transparent;
        border: 1px dashed rgba(10, 132, 255, 0.25);
        border-radius: 60px;
        padding: 9px 18px;
        font-size: 0.78rem;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        color: rgba(10, 132, 255, 0.55);
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-bottom: 16px;
      }
      .switch-account-pill:hover {
        background: rgba(10, 132, 255, 0.06);
        border-color: rgba(10, 132, 255, 0.5);
        color: #0a84ff;
        box-shadow: 0 0 10px rgba(10, 132, 255, 0.1);
      }
      .switch-account-pill i {
        font-size: 0.75rem;
      }

      .input-group {
        margin-bottom: 1.6rem;
        position: relative;
      }
      .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #0a84ff;
        font-size: 1.1rem;
        z-index: 2;
        text-shadow: 0 0 3px rgba(10, 132, 255, 0.2);
      }
      .input-field {
        width: 100%;
        background: rgba(10, 132, 255, 0.05);
        border: 1.5px solid rgba(10, 132, 255, 0.3);
        border-radius: 60px;
        padding: 14px 20px 14px 48px;
        font-size: 1rem;
        color: #0d1b2a;
        font-weight: 500;
        outline: none;
        transition: all 0.2s ease;
        font-family: "Inter", monospace;
      }

      .input-field::placeholder {
        color: rgba(13, 27, 42, 0.4);
      }

      body.dark .input-field {
        background: rgba(10, 132, 255, 0.08);
        color: #e5e7eb;
      }

      body.dark .input-field::placeholder {
        color: rgba(229, 231, 235, 0.4);
      }

      .input-field:focus {
        border-color: #0a84ff;
        box-shadow:
          0 0 15px rgba(10, 132, 255, 0.4),
          0 0 5px rgba(10, 132, 255, 0.6);
        background: rgba(10, 132, 255, 0.1);
      }
      .input-field.invalid-shake {
        animation: shakeGlitch 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        border-color: #ff3366;
        box-shadow: 0 0 12px #ff3366;
      }
      @keyframes shakeGlitch {
        0%,
        100% {
          transform: translateX(0);
        }
        10%,
        30%,
        50%,
        70%,
        90% {
          transform: translateX(-3px);
        }
        20%,
        40%,
        60%,
        80% {
          transform: translateX(3px);
        }
      }

      .neon-btn {
        width: 100%;
        background: linear-gradient(135deg, #0a84ff, #00b4d8);
        border: 1px solid #0a84ff;
        border-radius: 60px;
        padding: 14px;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.2s ease;
        backdrop-filter: blur(4px);
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: inherit;
      }
      .neon-btn:hover:not(:disabled) {
        transform: scale(1.02);
        background: linear-gradient(135deg, #0093d0, #0084c2);
        box-shadow: 0 0 20px rgba(10, 132, 255, 0.5);
        color: #fff;
        text-shadow: 0 0 5px rgba(10, 132, 255, 0.4);
      }
      .neon-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .otp-section {
        margin-top: 1rem;
        padding-top: 0.5rem;
        border-top: 1px dashed rgba(10, 132, 255, 0.3);
        transition: all 0.4s ease;
      }
      .otp-field-group {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 10px;
      }
      .otp-input {
        flex: 1;
        background: rgba(10, 132, 255, 0.05);
        border: 1.5px solid #0a84ff;
        border-radius: 60px;
        padding: 12px 18px;
        color: #0d1b2a;
        font-size: 1rem;
        letter-spacing: 2px;
        font-weight: bold;
        text-align: center;
        font-family: monospace;
        outline: none;
      }

      body.dark .otp-input {
        background: rgba(10, 132, 255, 0.08);
        color: #fff;
      }

      .otp-input:focus {
        box-shadow: 0 0 15px rgba(10, 132, 255, 0.5);
      }

      .small-neon {
        background: transparent;
        border: 1px solid #0a84ff;
        padding: 12px 18px;
        border-radius: 60px;
        color: #0a84ff;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-family: inherit;
        white-space: nowrap;
      }
      .small-neon:hover:not(:disabled) {
        background: rgba(10, 132, 255, 0.15);
        color: #006aff;
        box-shadow: 0 0 12px rgba(10, 132, 255, 0.3);
      }
      .small-neon:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .info-message {
        font-size: 0.75rem;
        margin-top: 8px;
        color: #0a84ff;
        text-align: center;
        min-height: 18px;
      }

      /* ── OTP persistence notice ── */
      .otp-persist-notice {
        font-size: 0.72rem;
        color: rgba(0, 229, 204, 0.7);
        text-align: center;
        margin-top: 10px;
        padding: 8px 12px;
        background: rgba(0, 229, 204, 0.06);
        border-radius: 8px;
        border: 1px solid rgba(0, 229, 204, 0.15);
      }
      .otp-persist-notice i {
        margin-right: 5px;
      }

      .action-buttons {
        display: flex;
        gap: 12px;
        margin-top: 12px;
      }
      .action-buttons .small-neon {
        flex: 1;
        text-align: center;
      }

      .email-display {
        text-align: center;
        color: #0a84ff;
        font-size: 0.85rem;
        margin-bottom: 12px;
        opacity: 0.85;
        font-style: italic;
        letter-spacing: 0.5px;
      }

      .powered {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.7rem;
        font-family: monospace;
        letter-spacing: 1.5px;
        color: #0a84ff;
        text-shadow: 0 0 3px rgba(10, 132, 255, 0.2);
        border-top: 0.5px solid rgba(10, 132, 255, 0.2);
        padding-top: 1.2rem;
        opacity: 0.8;
      }

      .login-container::before {
        content: "";
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, #0a84ff, #00e5cc, #0a84ff);
        border-radius: 2rem;
        z-index: -1;
        opacity: 0.1;
        filter: blur(8px);
        animation: borderGlitch 3s infinite;
      }
      @keyframes borderGlitch {
        0%,
        100% {
          opacity: 0.1;
          transform: translate(0);
        }
        95% {
          opacity: 0.3;
          filter: blur(10px);
        }
        96% {
          opacity: 0;
        }
        97% {
          opacity: 0.2;
        }
      }

      .redirect-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(245, 244, 240, 0.92);
        backdrop-filter: blur(12px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        color: #0a84ff;
        font-size: 1.5rem;
        animation: fadeInZoom 0.4s ease;
      }

      body.dark .redirect-loading {
        background: rgba(15, 23, 42, 0.92);
      }

      @keyframes fadeInZoom {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>

    <script src="pwa.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      window.EMAILJS_PUBLIC_KEY = "bzQug4w22xmmQYFAy";
      window.EMAILJS_SERVICE_ID = "service_zxs16vo";
      window.EMAILJS_TEMPLATE_ID = "template_fvy86tl";
      emailjs.init(window.EMAILJS_PUBLIC_KEY);
    </script>

    <!-- Dark Mode Toggle -->
    <script>
      // Initialize theme
      function initializeTheme() {
        const isDark =
          localStorage.getItem("jsl_dark_mode") === "true" ||
          (window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) {
          document.documentElement.classList.add("dark");
        }
      }

      // Run on load
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeTheme);
      } else {
        initializeTheme();
      }
    </script>
  </head>

  <body>
    <div class="cyber-grid"></div>
    <div id="particles-container"></div>

    <div class="login-container">
      <div class="vertex-card">
        <div class="logo-area">
          <div class="logo-wrapper">
            <img
              class="vertex-logo"
              src="RoundIcon.png"
              alt="JSL FastLine Logo"
              onerror="this.src = 'https://i.imgur.com/RoundIcon.png'"
            />
          </div>
          <div class="brand-name">JSL FASTLINE</div>
          <div class="tagline">FAST CONNECTIONS • SMART FUTURE</div>
        </div>

        <!-- ── STEP 1: Email Entry ── -->
        <div id="stepEmail">
          <div class="session-banner" id="sessionBanner" style="display: none">
            <i class="fas fa-user-check"></i>
            <span
              >Welcome back, <strong id="sessionEmailDisplay">—</strong><br />
              <span style="font-size: 0.75rem; opacity: 0.8"
                >Session active — tap Enter FastLine to continue</span
              >
            </span>
          </div>

          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email"
              id="emailInput"
              class="input-field"
              placeholder="Enter your email address"
              autocomplete="email"
            />
          </div>
          <button id="sendOtpBtn" class="neon-btn">
            <i class="fas fa-paper-plane"></i> Send OTP
          </button>
          <button
            id="enterChamberBtn"
            class="neon-btn"
            style="
              display: none;
              border-color: #00e5cc;
              color: #00e5cc;
              margin-top: 10px;
            "
          >
            <i class="fas fa-door-open"></i> Enter FastLine
          </button>
          <button
            id="switchAccountBtn"
            class="switch-account-pill"
            style="display: none"
          >
            <i class="fas fa-user-plus"></i> Login with different Email
          </button>
          <div class="info-message" id="emailErrorMsg"></div>
        </div>

        <!-- ── STEP 2: OTP Verification ── -->
        <div id="stepOtp" style="display: none">
          <div class="otp-section">
            <div
              class="info-message"
              style="color: #0a84ff; margin-bottom: 4px"
            >
              <i class="fas fa-shield-alt"></i> One-Time Passcode Required
            </div>
            <div class="email-display" id="emailDisplay"></div>
            <div class="otp-field-group">
              <input
                type="text"
                id="otpInput"
                class="otp-input"
                placeholder="6-digit OTP"
                maxlength="6"
                autocomplete="one-time-code"
                inputmode="numeric"
              />
              <button id="verifyOtpBtn" class="small-neon">
                <i class="fas fa-check-circle"></i> Verify
              </button>
            </div>
            <!-- Notice reminding user the OTP is saved if they switch apps -->
            <div class="otp-persist-notice">
              <i class="fas fa-info-circle"></i>
              Your OTP session is saved — go check your email and come back
              freely.
            </div>
            <div class="action-buttons">
              <button id="resendOtpBtn" class="small-neon">
                <i class="fas fa-sync-alt"></i> Resend OTP
              </button>
              <button id="backToEmailBtn" class="small-neon">
                <i class="fas fa-arrow-left"></i> Back
              </button>
            </div>
            <div class="info-message" id="otpErrorMsg"></div>
          </div>
        </div>

        <div class="powered">
          <i class="fas fa-bolt"></i> Powered By JSL FastLine • Fast & Secure
        </div>
      </div>
    </div>

    <!-- Firebase -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
      }
    </script>
    <script type="module">
      import { initializeApp } from "firebase/app";
      import { getFirestore, doc, getDoc } from "firebase/firestore";

      const firebaseConfig = {
        apiKey: "AIzaSyC3HO1BY4rw1uVlZnRn4qG3XpxipFzDs0M",
        authDomain: "vertex-chamber-993f6.firebaseapp.com",
        projectId: "vertex-chamber-993f6",
        storageBucket: "vertex-chamber-993f6.firebasestorage.app",
        messagingSenderId: "950688239086",
        appId: "1:950688239086:web:13b11f2581e908dabed2ff",
      };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // ── Long-term session (localStorage — 30 days) ────────
      const SESSION_EMAIL_KEY = "fastline_session_email";
      const SESSION_EXPIRY_KEY = "fastline_session_expiry";
      const SESSION_DURATION_MS = 30 * 24 * 60 * 60 * 1000;

      // ── Short-term OTP state (sessionStorage — survives app-switch, cleared on tab close) ──
      // KEY FIX: we use sessionStorage (not localStorage) to preserve the pending OTP
      // when the user switches to their email app and comes back. sessionStorage survives
      // app backgrounding on mobile, but is cleared when the tab is closed.
      const OTP_STATE_KEY = "fastline_pending_otp";

      function saveSession(email) {
        localStorage.setItem(SESSION_EMAIL_KEY, email);
        localStorage.setItem(
          SESSION_EXPIRY_KEY,
          Date.now() + SESSION_DURATION_MS,
        );
      }

      function getSession() {
        const email = localStorage.getItem(SESSION_EMAIL_KEY);
        const expiry = parseInt(
          localStorage.getItem(SESSION_EXPIRY_KEY) || "0",
        );
        if (email && Date.now() < expiry) return email;
        localStorage.removeItem(SESSION_EMAIL_KEY);
        localStorage.removeItem(SESSION_EXPIRY_KEY);
        return null;
      }

      // Save pending OTP to sessionStorage so switching to email app doesn't lose it
      function saveOtpState(email, otp, expiry) {
        sessionStorage.setItem(
          OTP_STATE_KEY,
          JSON.stringify({ email, otp, expiry }),
        );
      }

      function getOtpState() {
        try {
          const raw = sessionStorage.getItem(OTP_STATE_KEY);
          if (!raw) return null;
          const state = JSON.parse(raw);
          // Only return if not expired
          if (Date.now() > state.expiry) {
            sessionStorage.removeItem(OTP_STATE_KEY);
            return null;
          }
          return state;
        } catch {
          return null;
        }
      }

      function clearOtpState() {
        sessionStorage.removeItem(OTP_STATE_KEY);
      }

      function emailToId(email) {
        return email.toLowerCase().replace(/[^a-z0-9]/g, "_");
      }

      async function redirectAfterLogin(email) {
        showLoader("ACCESS GRANTED", "Checking your profile…");
        try {
          const userId = emailToId(email);
          const userRef = doc(db, "users", userId);
          const snap = await getDoc(userRef);
          if (snap.exists() && snap.data().username) {
            // Returning user: go to Home (not Messages/Profile)
            setTimeout(() => {
              window.location.href = "splash.html";
            }, 800);
          } else {
            // New user: go to Profile setup first
            setTimeout(() => {
              window.location.href = "profile.html";
            }, 800);
          }
        } catch (err) {
          console.error("Redirect check error:", err);
          // Safe default: Profile setup (new user path)
          setTimeout(() => {
            window.location.href = "profile.html";
          }, 800);
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        const savedEmail = getSession();
        if (savedEmail) {
          document.getElementById("sessionBanner").style.display = "flex";
          document.getElementById("sessionEmailDisplay").textContent =
            savedEmail;
          document.getElementById("sendOtpBtn").style.display = "none";
          document.getElementById("enterChamberBtn").style.display = "flex";
          document.getElementById("switchAccountBtn").style.display = "flex";
          document.getElementById("emailInput").value = savedEmail;
          document.getElementById("emailInput").disabled = true;

          document
            .getElementById("enterChamberBtn")
            .addEventListener("click", () => {
              redirectAfterLogin(savedEmail);
            });

          document
            .getElementById("switchAccountBtn")
            .addEventListener("click", () => {
              localStorage.removeItem("fastline_session_email");
              localStorage.removeItem("fastline_session_expiry");
              localStorage.removeItem("fastline_username");
              localStorage.removeItem("fastline_profile_completed");
              localStorage.removeItem("fastline_avatar");
              clearOtpState();
              document.getElementById("sessionBanner").style.display = "none";
              document.getElementById("enterChamberBtn").style.display = "none";
              document.getElementById("switchAccountBtn").style.display =
                "none";
              document.getElementById("sendOtpBtn").style.display = "flex";
              document.getElementById("emailInput").value = "";
              document.getElementById("emailInput").disabled = false;
              document.getElementById("emailInput").focus();
            });
        }

        setupLoginFlow(
          saveSession,
          redirectAfterLogin,
          saveOtpState,
          getOtpState,
          clearOtpState,
        );
      });

      function setupLoginFlow(
        saveSession,
        redirectAfterLogin,
        saveOtpState,
        getOtpState,
        clearOtpState,
      ) {
        const stepEmail = document.getElementById("stepEmail");
        const stepOtp = document.getElementById("stepOtp");
        const emailInput = document.getElementById("emailInput");
        const sendOtpBtn = document.getElementById("sendOtpBtn");
        const emailErrorMsg = document.getElementById("emailErrorMsg");
        const emailDisplay = document.getElementById("emailDisplay");
        const otpInput = document.getElementById("otpInput");
        const verifyOtpBtn = document.getElementById("verifyOtpBtn");
        const resendOtpBtn = document.getElementById("resendOtpBtn");
        const backToEmailBtn = document.getElementById("backToEmailBtn");
        const otpErrorMsg = document.getElementById("otpErrorMsg");

        const OTP_VALID_MINUTES = 10;

        // ── Restore any pending OTP session (KEY FIX) ────────
        // If user already sent an OTP and switched to email, we restore
        // the OTP step so they can paste right in.
        const pendingOtp = getOtpState();
        if (pendingOtp) {
          // Restore OTP step immediately
          stepEmail.style.display = "none";
          stepOtp.style.display = "block";
          emailDisplay.innerHTML = `<i class="fas fa-envelope"></i> OTP sent to <strong style="color:#fff">${pendingOtp.email}</strong>`;
          otpInput.value = "";
          otpErrorMsg.innerText = "";

          // Focus OTP input with a short delay (iOS needs this)
          setTimeout(() => otpInput.focus(), 300);
        }

        function isValidEmail(e) {
          return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(e);
        }
        function generateOTP() {
          return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function showNotification(message, color = "#0A84FF") {
          const n = document.createElement("div");
          Object.assign(n.style, {
            position: "fixed",
            top: "20px",
            right: "20px",
            background: "rgba(0,0,0,0.95)",
            borderLeft: `4px solid ${color}`,
            color: "#fff",
            padding: "12px 20px",
            borderRadius: "8px",
            fontSize: "14px",
            zIndex: "1000",
            backdropFilter: "blur(10px)",
            fontFamily: "Inter, monospace",
            maxWidth: "320px",
          });
          n.innerHTML = `<i class="fas fa-bolt" style="color:${color};margin-right:8px;"></i>${message}`;
          document.body.appendChild(n);
          setTimeout(() => n.remove(), 5000);
        }

        function shake(el) {
          el.classList.remove("invalid-shake");
          void el.offsetWidth;
          el.classList.add("invalid-shake");
          setTimeout(() => el.classList.remove("invalid-shake"), 500);
        }

        function transitionTo(hideEl, showEl) {
          hideEl.style.transition = "opacity 0.25s ease, transform 0.25s ease";
          hideEl.style.opacity = "0";
          hideEl.style.transform = "translateY(-10px)";
          setTimeout(() => {
            hideEl.style.display = "none";
            showEl.style.display = "block";
            showEl.style.opacity = "0";
            showEl.style.transform = "translateY(20px)";
            setTimeout(() => {
              showEl.style.transition =
                "opacity 0.4s ease, transform 0.4s ease";
              showEl.style.opacity = "1";
              showEl.style.transform = "translateY(0)";
            }, 50);
          }, 250);
        }

        async function sendOTP(email) {
          const otp = generateOTP();
          const expiry = Date.now() + OTP_VALID_MINUTES * 60 * 1000;
          await emailjs.send(
            window.EMAILJS_SERVICE_ID,
            window.EMAILJS_TEMPLATE_ID,
            {
              to_email: email,
              to_name: email,
              otp_code: otp,
              app_name: "JSL FastLine",
            },
          );
          // Persist OTP state so switching apps doesn't lose it
          saveOtpState(email, otp, expiry);
          console.log(`[DEMO] OTP for ${email}: ${otp}`);
          return { otp, expiry };
        }

        async function handleSendOtp() {
          const email = emailInput.value.trim();
          emailErrorMsg.innerText = "";
          if (!isValidEmail(email)) {
            emailErrorMsg.innerText = "⚠️ Please enter a valid email address.";
            shake(emailInput);
            return;
          }
          sendOtpBtn.innerHTML =
            '<i class="fas fa-spinner fa-pulse"></i> Sending...';
          sendOtpBtn.disabled = true;
          try {
            await sendOTP(email);
            emailDisplay.innerHTML = `<i class="fas fa-envelope"></i> OTP sent to <strong style="color:#0A84FF">${email}</strong>`;
            showNotification(
              `📧 OTP sent to ${email}! Check your inbox.`,
              "#0A84FF",
            );
            transitionTo(stepEmail, stepOtp);
            otpInput.value = "";
            otpErrorMsg.innerText = "";
            setTimeout(() => otpInput.focus(), 400);
          } catch (err) {
            emailErrorMsg.innerText =
              "❌ Failed to send OTP. Check your EmailJS config or internet.";
            showNotification(
              "Failed to send OTP: " + (err.text || err.message),
              "#ff3366",
            );
          } finally {
            sendOtpBtn.innerHTML =
              '<i class="fas fa-paper-plane"></i> Send OTP';
            sendOtpBtn.disabled = false;
          }
        }

        function handleVerifyOtp() {
          const entered = otpInput.value.trim();
          otpErrorMsg.innerText = "";
          otpErrorMsg.style.color = "#6c9eff";

          // Read LIVE from sessionStorage in case of page-restore
          const state = getOtpState();
          if (!state) {
            otpErrorMsg.innerText =
              "⏳ OTP session expired. Please go back and request a new one.";
            shake(otpInput);
            return;
          }

          if (!entered || entered.length !== 6 || isNaN(entered)) {
            otpErrorMsg.innerText =
              "❌ Enter the 6-digit code from your email.";
            shake(otpInput);
            return;
          }
          if (Date.now() > state.expiry) {
            clearOtpState();
            otpErrorMsg.innerText = "⏳ OTP expired. Please request a new one.";
            shake(otpInput);
            return;
          }

          verifyOtpBtn.innerHTML =
            '<i class="fas fa-spinner fa-pulse"></i> Verifying...';
          verifyOtpBtn.disabled = true;

          if (entered === state.otp) {
            otpErrorMsg.style.color = "#0f6";
            otpErrorMsg.innerText = "✓ Identity verified. Granting access...";
            saveSession(state.email);
            clearOtpState();
            setTimeout(() => redirectAfterLogin(state.email), 800);
          } else {
            otpErrorMsg.innerText = "❌ Incorrect OTP. Please try again.";
            shake(otpInput);
            verifyOtpBtn.innerHTML =
              '<i class="fas fa-check-circle"></i> Verify';
            verifyOtpBtn.disabled = false;
          }
        }

        async function handleResendOtp() {
          const state = getOtpState();
          const email = state?.email || emailInput.value.trim();
          if (!email) {
            otpErrorMsg.innerText = "Session expired. Go back and try again.";
            return;
          }
          resendOtpBtn.innerHTML =
            '<i class="fas fa-spinner fa-pulse"></i> Sending...';
          resendOtpBtn.disabled = true;
          otpErrorMsg.innerText = "";
          try {
            await sendOTP(email);
            otpInput.value = "";
            otpErrorMsg.style.color = "#0f6";
            otpErrorMsg.innerText = "✓ New OTP sent! Check your email.";
            showNotification(`📧 New OTP sent to ${email}`, "#0A84FF");
            setTimeout(() => {
              otpErrorMsg.innerText = "";
            }, 4000);
          } catch (err) {
            otpErrorMsg.innerText = "❌ Failed to resend. Try again.";
          } finally {
            resendOtpBtn.innerHTML =
              '<i class="fas fa-sync-alt"></i> Resend OTP';
            resendOtpBtn.disabled = false;
          }
        }

        function handleBack() {
          clearOtpState();
          emailInput.value = "";
          emailErrorMsg.innerText = "";
          transitionTo(stepOtp, stepEmail);
        }

        sendOtpBtn.addEventListener("click", handleSendOtp);
        verifyOtpBtn.addEventListener("click", handleVerifyOtp);
        resendOtpBtn.addEventListener("click", handleResendOtp);
        backToEmailBtn.addEventListener("click", handleBack);
        emailInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") handleSendOtp();
        });
        otpInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") handleVerifyOtp();
        });
        otpInput.addEventListener("input", () => {
          otpInput.value = otpInput.value.replace(/\D/g, "");
        });
      }

      function showLoader(title, subtitle) {
        const loader = document.createElement("div");
        loader.className = "redirect-loading";
        loader.innerHTML = `
          <div style="text-align:center;">
            <i class="fas fa-spinner fa-pulse fa-3x" style="color:#0A84FF;"></i>
            <p style="margin-top:16px; letter-spacing:2px; font-weight:600;">${title}</p>
            <p style="font-size:0.8rem; opacity:0.9;">${subtitle}</p>
            <div style="margin-top:20px;"><i class="fas fa-cube" style="color:#0A84FF;"></i></div>
          </div>`;
        document.body.appendChild(loader);
        const container = document.querySelector(".login-container");
        container.style.transition =
          "transform 0.5s cubic-bezier(0.2,0.9,0.4,1.1), opacity 0.5s";
        container.style.transform = "scale(0.95)";
        container.style.opacity = "0";
      }
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const pc = document.getElementById("particles-container");
        for (let i = 0; i < 80; i++) {
          const p = document.createElement("div");
          p.classList.add("particle");
          const size = Math.random() * 4 + 1;
          p.style.cssText =
            `width:${size}px;height:${size}px;left:${Math.random() * 100}%;` +
            `animation-duration:${Math.random() * 12 + 5}s;animation-delay:${Math.random() * 8}s;` +
            `background:radial-gradient(circle,${Math.random() > 0.7 ? "#0A84FF" : "#00E5CC"},transparent)`;
          pc.appendChild(p);
        }
      });
    </script>
  </body>
</html>
